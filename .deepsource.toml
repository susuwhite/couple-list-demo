version = 1

# ============================================================
# DeepSource 配置文件
# 文档: https://docs.deepsource.com/docs/configuration
# ============================================================

# 排除不需要分析的文件和目录
exclude_patterns = [
    "dist/**",
    "node_modules/**",
    "coverage/**",
    "public/**",
    "**/*.min.js",
    "**/*.bundle.js",
]

# 测试文件模式 (DeepSource 会识别为测试代码，分开统计指标)
test_patterns = ["tests/**", "**/*.spec.js", "**/*.test.js", "__tests__/**"]

# ============================================================
# JavaScript / Vue 分析器
# 支持: ES6+, Vue SFC, Node.js
# 可检测: 反模式、Bug风险、安全漏洞、性能问题、样式问题
# ============================================================
[[analyzers]]
name = "javascript"
enabled = true

[analyzers.meta]
# 单行最大长度
max_line_length = 120
# 依赖文件路径 (用于检测过时/有漏洞的依赖)
dependency_file_paths = ["package.json"]
# 启用 Vue.js 框架支持 (可选值: vue, react, ember, meteor, angular)
plugins = ["vue"]
# 环境声明 (browser / node 等)
environment = ["browser", "nodejs"]
# 类型方言 (仅在使用 TypeScript 或 Flow 时设置)
# dialect = "typescript"

# ============================================================
# 测试覆盖率 (Test Coverage)
# 支持上传 lcov、cobertura、jacoco 等格式
# 通过 CI 上报后，DeepSource 会展示覆盖率趋势和未覆盖行
# ============================================================
[[analyzers]]
name = "test-coverage"
enabled = true
# test-coverage 分析器无 meta 配置项
# 通过 CI 上报 lcov/cobertura 等格式的覆盖率数据即可

# ============================================================
# Secrets 检测分析器
# 自动扫描代码中意外提交的敏感信息 (API Key, Token 等)
# ============================================================
[[analyzers]]
name = "secrets"
enabled = true

# ============================================================
# Docker 分析器 (如有 Dockerfile 可启用)
# ============================================================
# [[analyzers]]
# name = "docker"
# enabled = true

# ============================================================
# 转换器 (Transformers) - DeepSource Autofix
# 自动修复被检测到的问题，通过 PR 提交修复
# ============================================================
[[transformers]]
name = "prettier"
enabled = true

# 注意: DeepSource 的 JS/TS 转换器仅支持 prettier
# eslint 不是受支持的 transformer，已移除
